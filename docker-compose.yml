services:
  # Backend (Go)
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "8083:8081"
    expose:
      - "8081"
    environment:
      - PORT=8081
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_ADDR=redis:6379
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - APP_URL=${APP_URL:-https://projetos.fbtax.cloud}
      - JWT_SECRET=${JWT_SECRET}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
    depends_on:
      - redis
    volumes:
      - api_uploads:/root/uploads
    networks:
      - fb_net

  # Frontend (React)
  web:
    build: ./frontend
    restart: always
    ports:
      - "3002:80"
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fb-apu03.rule=Host(`projetos.fbtax.cloud`)"
      - "traefik.http.routers.fb-apu03.entrypoints=websecure"
      - "traefik.http.routers.fb-apu03.tls.certresolver=letsencrypt"
      - "traefik.http.services.fb-apu03.loadbalancer.server.port=80"
    depends_on:
      - api
    networks:
      - fb_net

  # Redis
  redis:
    image: redis:alpine
    restart: always
    sysctls:
      - net.core.somaxconn=1024
    networks:
      - fb_net

networks:
  fb_net:
    driver: bridge

volumes:
  api_uploads:
